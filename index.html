<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BULL MONITOR v3 — 牛市末期监测系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   BULL MONITOR — 战术指挥中心主题
   ═══════════════════════════════════════════════════════ */
:root {
  --bg: #06060e;
  --surface: #0b0c16;
  --surface2: #111225;
  --surface3: #181a30;
  --border: #1e2040;
  --border2: #2a2d50;
  --text: #e0e0f0;
  --text-mid: #8888a8;
  --text-dim: #555575;
  --text-muted: #3a3a58;
  --red: #ff2d55;
  --red-light: rgba(255,45,85,0.1);
  --red-glow: rgba(255,45,85,0.4);
  --orange: #ff8800;
  --orange-light: rgba(255,136,0,0.1);
  --yellow: #ffd000;
  --yellow-light: rgba(255,208,0,0.08);
  --green: #00e676;
  --green-light: rgba(0,230,118,0.08);
  --gray: #607080;
  --gray-light: rgba(96,112,128,0.12);
  --accent: #3d5afe;
  --font-display: 'Chakra Petch', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* 背景网格图案 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 50% 0%, rgba(61,90,254,0.06) 0%, transparent 60%),
    radial-gradient(circle, var(--text-muted) 0.5px, transparent 0.5px);
  background-size: 100% 100%, 24px 24px;
  pointer-events: none;
  z-index: 0;
}

/* 扫描线动画 */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(61,90,254,0.4), rgba(0,230,118,0.3), transparent);
  animation: scanline 8s linear infinite;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}
@keyframes scanline {
  0% { top: -2px; }
  100% { top: 100vh; }
}

/* ── HEADER ── */
header {
  background: linear-gradient(180deg, #0d0e1a 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  height: 52px;
  position: relative;
  z-index: 1;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--red) 30%, var(--orange) 60%, var(--yellow) 80%, transparent 100%);
  opacity: 0.5;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-eyebrow {
  font-size: 8px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text);
  font-family: var(--font-display);
  position: relative;
}
.header-title::before {
  content: '◆';
  color: var(--red);
  font-size: 8px;
  margin-right: 8px;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.header-date {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.05em;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.header-time {
  font-size: 18px;
  font-weight: 500;
  font-family: var(--font-mono);
  color: var(--green);
  letter-spacing: 0.08em;
  text-shadow: 0 0 12px rgba(0,230,118,0.4);
}

/* ── HERO PANEL ── */
.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 40px 32px;
  display: grid;
  grid-template-columns: 220px 1fr auto;
  gap: 40px;
  align-items: center;
  position: relative;
  z-index: 1;
  overflow: hidden;
}
/* 英雄区域背景光晕 */
.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 110px;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(61,90,254,0.06), transparent 70%);
  pointer-events: none;
}

/* 圆形风险仪表盘 */
.hero-score {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}
.gauge-wrap {
  position: relative;
  width: 160px;
  height: 160px;
}
.gauge-svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.gauge-bg {
  fill: none;
  stroke: var(--surface3);
  stroke-width: 4;
}
.gauge-fill {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.5s cubic-bezier(0.23, 1, 0.32, 1), stroke 0.8s ease;
  filter: drop-shadow(0 0 6px var(--red-glow));
}
.gauge-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.hero-score-num {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
  font-family: var(--font-mono);
  color: var(--text);
}
.hero-score-num.s0 { color: var(--green); text-shadow: 0 0 20px rgba(0,230,118,0.3); }
.hero-score-num.s1 { color: var(--gray); }
.hero-score-num.s2 { color: var(--yellow); text-shadow: 0 0 20px rgba(255,208,0,0.3); }
.hero-score-num.s3 { color: var(--orange); text-shadow: 0 0 20px rgba(255,136,0,0.4); }
.hero-score-num.s4 { color: var(--red); text-shadow: 0 0 24px var(--red-glow); animation: dangerPulse 1.5s ease-in-out infinite; }
@keyframes dangerPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.hero-score-label {
  font-size: 8px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-display);
}

/* 威胁等级指示灯 */
.threat-level {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}
.threat-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--surface3);
  transition: background 0.5s, box-shadow 0.5s;
}
.threat-dot.active-green { background: var(--green); box-shadow: 0 0 6px rgba(0,230,118,0.5); }
.threat-dot.active-yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(255,208,0,0.5); }
.threat-dot.active-orange { background: var(--orange); box-shadow: 0 0 6px rgba(255,136,0,0.5); }
.threat-dot.active-red { background: var(--red); box-shadow: 0 0 6px var(--red-glow); animation: blink 1.2s ease-in-out infinite; }

.hero-content { display: flex; flex-direction: column; gap: 10px; }
.hero-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  font-family: var(--font-display);
}
.hero-title.s4 { color: var(--red); text-shadow: 0 0 16px var(--red-glow); }
.hero-desc {
  font-size: 12px;
  color: var(--text-mid);
  line-height: 1.8;
  max-width: 600px;
  font-family: var(--font-body);
}
.hero-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  padding: 3px 10px;
  border-radius: 1px;
  font-family: var(--font-display);
  white-space: nowrap;
  border: 1px solid;
}
.tag-red { background: var(--red-light); color: var(--red); border-color: rgba(255,45,85,0.25); }
.tag-orange { background: var(--orange-light); color: var(--orange); border-color: rgba(255,136,0,0.25); }
.tag-yellow { background: var(--yellow-light); color: var(--yellow); border-color: rgba(255,208,0,0.2); }
.tag-green { background: var(--green-light); color: var(--green); border-color: rgba(0,230,118,0.2); }

/* 英雄区域右侧指标卡 */
.hero-metrics {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.hero-metric {
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  transition: background 0.2s;
}
.hero-metric:hover { background: var(--surface2); }
.hero-metric-num {
  font-size: 28px;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1;
  min-width: 48px;
}
.hero-metric-label {
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-display);
}

/* ── CATEGORY PANELS ── */
.cat-panel {
  margin: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
  z-index: 1;
}
.cat-header {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.cat-marker {
  width: 3px;
  height: 28px;
  border-radius: 1px;
}
.cat-title-group { display: flex; flex-direction: column; gap: 1px; }
.cat-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  font-family: var(--font-display);
}
.cat-subtitle {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  font-family: var(--font-mono);
}
.cat-status { display: flex; gap: 8px; align-items: center; }
.cat-badge {
  font-size: 8px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 1px;
  font-family: var(--font-display);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid;
}
.cat-badge.red { background: var(--red-light); color: var(--red); border-color: rgba(255,45,85,0.3); }
.cat-badge.orange { background: var(--orange-light); color: var(--orange); border-color: rgba(255,136,0,0.3); }
.cat-badge.yellow { background: var(--yellow-light); color: var(--yellow); border-color: rgba(255,208,0,0.25); }
.cat-badge.green { background: var(--green-light); color: var(--green); border-color: rgba(0,230,118,0.25); }
.cat-badge.gray { background: var(--gray-light); color: var(--gray); border-color: rgba(96,112,128,0.2); }

/* ── INDICATOR CARDS GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0;
}

.ind-card {
  padding: 16px 20px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 180px;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
  animation: cardFadeIn 0.6s ease backwards;
}
/* 交错动画延迟 */
.ind-card:nth-child(1) { animation-delay: 0.05s; }
.ind-card:nth-child(2) { animation-delay: 0.1s; }
.ind-card:nth-child(3) { animation-delay: 0.15s; }
.ind-card:nth-child(4) { animation-delay: 0.2s; }
.ind-card:nth-child(5) { animation-delay: 0.25s; }
.ind-card:nth-child(6) { animation-delay: 0.3s; }
@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.ind-card:hover {
  background: var(--surface2);
  border-color: var(--border2);
}
.ind-card:nth-child(3n) { border-right: none; }
.ind-card:nth-last-child(-n+3) { border-bottom: none; }

/* 卡片顶部：名称 + 信号灯 */
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.card-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  font-family: var(--font-display);
}
.card-sub {
  font-size: 9px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  margin-top: 2px;
}
/* 信号灯徽章 */
.card-badge {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 1px;
  white-space: nowrap;
  font-family: var(--font-display);
  flex-shrink: 0;
  border: 1px solid;
  position: relative;
}
/* 信号灯小圆点 */
.card-badge::before {
  content: '';
  position: absolute;
  left: -1px;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 3px;
  height: 3px;
  border-radius: 50%;
}
.cb-0 { background: var(--green-light); color: var(--green); border-color: rgba(0,230,118,0.3); }
.cb-0::before { background: var(--green); box-shadow: 0 0 4px var(--green); }
.cb-1 { background: var(--gray-light); color: var(--gray); border-color: rgba(96,112,128,0.2); }
.cb-1::before { background: var(--gray); }
.cb-2 { background: var(--yellow-light); color: var(--yellow); border-color: rgba(255,208,0,0.25); }
.cb-2::before { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
.cb-3 { background: var(--orange-light); color: var(--orange); border-color: rgba(255,136,0,0.3); }
.cb-3::before { background: var(--orange); box-shadow: 0 0 4px var(--orange); }
.cb-4 { background: var(--red-light); color: var(--red); border-color: rgba(255,45,85,0.35); }
.cb-4::before { background: var(--red); box-shadow: 0 0 6px var(--red); animation: blink 1.5s ease-in-out infinite; }

/* 数值行 */
.card-value-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.card-value {
  font-size: 32px;
  font-weight: 500;
  font-family: var(--font-mono);
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--text);
}
.card-value.v0 { color: var(--green); text-shadow: 0 0 12px rgba(0,230,118,0.25); }
.card-value.v1 { color: var(--gray); }
.card-value.v2 { color: var(--yellow); text-shadow: 0 0 12px rgba(255,208,0,0.25); }
.card-value.v3 { color: var(--orange); text-shadow: 0 0 14px rgba(255,136,0,0.3); }
.card-value.v4 { color: var(--red); text-shadow: 0 0 16px var(--red-glow); }
.card-unit {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.card-threshold {
  font-size: 8px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-left: auto;
}

/* 进度条 */
.card-bar-wrap { display: flex; align-items: center; gap: 8px; }
.card-bar-track {
  flex: 1;
  height: 3px;
  background: var(--surface3);
  border-radius: 2px;
  overflow: hidden;
}
.card-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
}
/* 进度条发光效果 */
.card-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: -1px;
  bottom: -1px;
  width: 8px;
  border-radius: 50%;
  filter: blur(2px);
}
.card-bar-pct {
  font-size: 9px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  min-width: 30px;
  text-align: right;
}

/* 迷你折线图 */
.card-spark {
  height: 36px;
  margin-top: 2px;
}
.card-spark svg { width: 100%; height: 100%; overflow: visible; }

/* 注释/说明展开区域 */
.card-note {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.card-note-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
}
.card-note-toggle {
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-display);
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}
.card-note-toggle:hover { color: var(--text-mid); }
.card-note-toggle::before { content: '▸'; font-size: 8px; transition: transform 0.2s; }
.card-note.open .card-note-toggle::before { transform: rotate(90deg); }
.card-note-body {
  display: none;
  padding-top: 8px;
  font-size: 10px;
  color: var(--text-mid);
  line-height: 1.8;
  font-family: var(--font-body);
}
.card-note.open .card-note-body { display: block; }
.card-note-body strong {
  color: var(--text);
  display: block;
  margin-bottom: 3px;
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: var(--font-display);
}

/* 骨架屏加载动画 */
.skel {
  background: linear-gradient(90deg, var(--surface3) 25%, var(--border) 50%, var(--surface3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 1px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── FOOTER ── */
footer {
  background: var(--surface);
  color: var(--text-dim);
  padding: 12px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}
.footer-left { display: flex; align-items: center; gap: 12px; font-size: 9px; font-family: var(--font-mono); color: var(--text-dim); }
.footer-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.dot-ok { background: var(--green); box-shadow: 0 0 6px rgba(0,230,118,0.4); }
.dot-err { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
.dot-loading { background: var(--yellow); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.footer-right { display: flex; align-items: center; gap: 16px; }
.footer-time { font-size: 9px; color: var(--text-dim); font-family: var(--font-mono); }
.footer-refresh {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 6px 16px;
  cursor: pointer;
  font-family: var(--font-display);
  border-radius: 1px;
  transition: all 0.25s;
}
.footer-refresh:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(61,90,254,0.2);
}

/* ── 响应式 ── */
@media (max-width: 1100px) {
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
  .ind-card:nth-child(3n) { border-right: 1px solid var(--border); }
  .ind-card:nth-child(2n) { border-right: none; }
  .ind-card:nth-last-child(-n+3) { border-bottom: 1px solid var(--border); }
  .ind-card:nth-last-child(-n+2) { border-bottom: none; }
  .hero { grid-template-columns: 1fr; gap: 24px; }
}
@media (max-width: 768px) {
  header { padding: 0 16px; }
  .hero { padding: 20px 16px; grid-template-columns: 1fr; }
  .hero-metrics { flex-direction: row; }
  .hero-metric { padding: 10px 16px; flex: 1; }
  .cat-panel { margin: 8px; }
  .cat-header { padding: 10px 16px; }
  .ind-card { padding: 12px 16px; }
  .cards-grid { grid-template-columns: 1fr; }
  .ind-card { border-right: none !important; border-bottom: 1px solid var(--border); }
  .ind-card:last-child { border-bottom: none; }
  footer { padding: 10px 16px; flex-direction: column; gap: 8px; }
  .gauge-wrap { width: 120px; height: 120px; }
  .hero-score-num { font-size: 42px; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-eyebrow">Quantitative Early Warning</span>
    <span class="header-title">Bull Monitor</span>

  document.getElementById('header-date').textContent = now.toLocaleDateString('zh-CN', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });

function getLevel(v, t, invert = false) {
  if (invert) {
    if (v <= t[3]) return 4;
    if (v <= t[2]) return 3;
    if (v <= t[1]) return 2;
    if (v <= t[0]) return 1;
    return 0;
  }
  if (v >= t[3]) return 4;
  if (v >= t[2]) return 3;
  if (v >= t[1]) return 2;
  if (v >= t[0]) return 1;
  return 0;
}

// 更新仪表盘弧线动画
// ═══════════════════════════════════════════════════════
function updateGauge(score, level) {
  const arc = document.getElementById('gauge-arc');
  if (!arc) return;
  const circumference = 2 * Math.PI * 70; // r=70
  const offset = circumference - (score / 100) * circumference;
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = GAUGE_COLORS[level];
  // 更新发光效果颜色
  const glowColor = GAUGE_COLORS[level] + '55';
  arc.style.filter = `drop-shadow(0 0 8px ${glowColor})`;
}

// 更新威胁等级指示灯
// ═══════════════════════════════════════════════════════
function updateThreatDots(level) {
  const colorMap = ['active-green','active-green','active-yellow','active-orange','active-red'];
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById(`td${i}`);
    if (!dot) continue;
    dot.className = 'threat-dot';
    if (i <= level) {
      dot.classList.add(colorMap[level]);
    }
  }
}

// ═══════════════════════════════════════════════════════
// 更新指标
// ═══════════════════════════════════════════════════════
window.updateIndicator = function(id, value, spark) {
  let ind = null;
  for (const cat of CATS) {
    ind = cat.indicators.find(i => i.id === id);
    if (ind) break;
  }
  if (!ind) return;

  allData[id] = { value, spark: spark || [] };
  const lv = getLevel(value, ind.thresholds, ind.invertThresholds);
  const [bc, vc, sl] = SIG[lv];

  // 信号灯徽章
  const badge = document.getElementById(`badge-${id}`);
  badge.className = `card-badge ${bc}`;
  badge.textContent = sl;

  // 数值
  const valEl = document.getElementById(`val-${id}`);
  valEl.className = `card-value ${vc}`;
  valEl.textContent = isNaN(value) ? '--' :
    (Number.isInteger(value) || ind.unit === '' || ind.unit === '倍' || ind.unit === '比值'
      ? value : value.toFixed(2));

  // 进度条
  const maxThresh = ind.thresholds[ind.thresholds.length - 1];
  let barPct;
  if (ind.invertThresholds) {
    const range = Math.abs(ind.thresholds[0] - ind.thresholds[3]);
    barPct = Math.min(100, Math.abs(value - ind.thresholds[0]) / range * 100);
  } else {
    barPct = Math.min(100, (Math.abs(value) / maxThresh) * 100);
  }
  const barEl = document.getElementById(`bar-${id}`);
  const pctEl = document.getElementById(`pct-${id}`);
  barEl.style.width = barPct + '%';
  barEl.style.background = BAR_COLORS[lv];
  // 进度条尾端发光
  barEl.style.boxShadow = `0 0 6px ${BAR_COLORS[lv]}44`;
  pctEl.textContent = barPct.toFixed(0) + '%';

  // 迷你折线图
  if (spark && spark.length > 1) drawSpark(id, spark, lv);

  updateOverall();
  updateCatStatus();
  updateFooter();
};

function drawSpark(id, data, lv) {
  const svg = document.getElementById(`svg-${id}`);
  if (!data || data.length < 2 || !svg) return;
  const w = 200, h = 36, pad = 2;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((v - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const col = BAR_COLORS[lv];
  svg.innerHTML = `
    <defs>
      <linearGradient id="sg-${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${pts.join(' ')} ${w-pad},${h-pad} ${pad},${h-pad}" fill="url(#sg-${id})"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round" opacity="0.8"/>
    <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="${col}" style="filter:drop-shadow(0 0 3px ${col})"/>
  `;
}

// ═══════════════════════════════════════════════════════
// 总体风险评估
// ═══════════════════════════════════════════════════════
function updateOverall() {
  const allInd = CATS.flatMap(c => c.indicators);
  const scored = allInd.filter(ind => !isNaN(allData[ind.id]?.value));
  if (scored.length < 3) return;

  let total = 0;
  scored.forEach(ind => {
    const v = allData[ind.id].value;
    const maxT = ind.thresholds[ind.thresholds.length - 1];
    let norm;
    if (ind.invertThresholds) {
      const range = Math.abs(ind.thresholds[0] - ind.thresholds[3]);
      norm = Math.min(100, Math.abs(v - ind.thresholds[0]) / range * 100);
    } else {
      norm = Math.min(100, Math.abs(v) / maxT * 100);
    }
    total += norm;
  });
  const overall = total / scored.length;
  const lv = overall < 30 ? 0 : overall < 50 ? 1 : overall < 65 ? 2 : overall < 80 ? 3 : 4;

  const scoreEl = document.getElementById('overall-score');
  scoreEl.textContent = isNaN(overall) ? '--' : Math.round(overall);
  scoreEl.className = `hero-score-num s${lv}`;

  // 更新仪表盘弧线
  updateGauge(Math.round(overall), lv);

  // 更新威胁指示灯
  updateThreatDots(lv);

  const titles = [
    ['MARKET STABLE · 市场整体稳健', false],
    ['WARMING UP · 情绪略有升温', false],
    ['OVERHEATING · 进入偏热区域', false],
    ['ALERT · 高估信号聚集', false],
    ['CRITICAL · 末期风险显著', true],
  ];
  const titleEl = document.getElementById('overall-title');
  titleEl.textContent = titles[lv][0];
  titleEl.className = `hero-title${titles[lv][1] ? ' s4' : ''}`;

  const descs = [
    '各项指标处于正常区间，市场估值合理，资金面平稳，尚未出现泡沫化特征。继续保持仓位，可适度逆向布局。',
    '部分情绪指标开始升温，但整体仍在合理范围。关注边际变化，暂不需大幅调整仓位结构。',
    '估值和情绪指标已进入历史偏高区间，历史上此阶段市场波动加大。建议适度控制仓位，锁定部分利润。',
    '多项核心指标已触发牛市末期警告信号。资金边际衰竭、情绪极度亢奋。务必严格风控，逐步离场。',
    '综合风险指数触及极端区间。历史上类似信号均对应牛市大顶。立即启动风控计划，绝不追高，逐步清仓。',
  ];
  document.getElementById('overall-desc').textContent = descs[lv];

  // 风险标签
  const fired = scored.filter(ind => getLevel(allData[ind.id].value, ind.thresholds, ind.invertThresholds) >= 3);
  const warn = scored.filter(ind => getLevel(allData[ind.id].value, ind.thresholds, ind.invertThresholds) === 2);
  const tagsEl = document.getElementById('overall-tags');
  tagsEl.innerHTML = fired.slice(0, 3).map(ind =>
    `<span class="tag tag-red">⚡ ${ind.name}</span>`
  ).join('') + warn.slice(0, 2).map(ind =>
    `<span class="tag tag-orange">⚠ ${ind.name}</span>`
  ).join('');

  // 计数
  document.getElementById('h-triggered').textContent = fired.length;
  document.getElementById('h-warning').textContent = warn.length;
  document.getElementById('h-ok').textContent = scored.length - fired.length - warn.length;
}

function updateCatStatus() {
  CATS.forEach(cat => {
    const fired = cat.indicators.filter(ind =>
      !isNaN(allData[ind.id]?.value) && getLevel(allData[ind.id].value, ind.thresholds, ind.invertThresholds) >= 3
    );
    const warn = cat.indicators.filter(ind =>
      !isNaN(allData[ind.id]?.value) && getLevel(allData[ind.id].value, ind.thresholds, ind.invertThresholds) === 2
    );
    const total = cat.indicators.length;
    const loaded = cat.indicators.filter(ind => !isNaN(allData[ind.id]?.value)).length;
    const statusEl = document.getElementById(`cat-status-${cat.id}`);
    if (!statusEl) return;
    if (loaded < total) {
      statusEl.innerHTML = `<span class="cat-badge gray">${loaded}/${total} LOADED</span>`;
    } else if (fired.length >= 2) {
      statusEl.innerHTML = `<span class="cat-badge red">${fired.length} TRIGGERED</span><span class="cat-badge orange" style="margin-left:4px;">${warn.length} WARN</span>`;
    } else if (warn.length >= 1) {
      statusEl.innerHTML = `<span class="cat-badge orange">${warn.length} WARNING</span>`;
    } else {
      statusEl.innerHTML = `<span class="cat-badge green">NOMINAL</span>`;
    }
  });
}

function updateFooter() {
  const allInd = CATS.flatMap(c => c.indicators);
  const loaded = Object.keys(allData).length;
  const total = allInd.length;
  const dot = document.getElementById('footer-dot');
  const status = document.getElementById('footer-status');
  const time = document.getElementById('footer-time');

  if (loaded < total) {
    dot.className = 'footer-dot dot-loading';
    status.textContent = `LOADING ${loaded}/${total}`;
  } else {
    dot.className = 'footer-dot dot-ok';
    status.textContent = pyodideReady ? 'LIVE DATA' : 'DEMO MODE (OFFLINE)';
    time.textContent = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit' });
  }
}
